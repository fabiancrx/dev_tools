name: dash_tools
description: Set of utilities to simplify a programmers day to day tasks
version: 0.0.2+2
publish_to: none

environment:
  sdk: ^3.11.0

dependencies:
#  SDK
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  intl: ^0.20.2
  yaru: ^10.1.0
  window_manager: ^0.5.1
  handy_window: ^0.4.0

  flutter_highlight: ^0.7.0

  flutter_riverpod: ^3.0.0
  equatable: ^2.0.7

  dart_jsonwebtoken: ^3.2.0
  uuid: ^4.5.1
  crypto: ^3.0.6
  recase: ^4.1.0
  pretty_qr_code: ^3.6.0
  url_launcher: ^6.3.2
  file_picker: ^11.0.2
  super_clipboard: ^0.9.1
  super_drag_and_drop: ^0.9.1
  super_context_menu: ^0.9.1
  format_bytes: ^2.1.0
  code_forge: ^9.10.0
  re_highlight: ^0.0.3
  shared_preferences: ^2.5.5
  flutter_svg: ^2.0.10
  json_path: ^0.9.0

dependency_overrides:
  intl: ^0.20.2

dev_dependencies:
  flutter_lints: ^6.0.0
  flutter_test:
    sdk: flutter
  mocktail: ^1.0.4

flutter:
  uses-material-design: true
  generate: true
  assets:
    - assets/icons/
